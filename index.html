<html lang="es">
<head>
    <meta charset="UTF-8">

<body>

<div class="bg"></div>

<div class="container">

    <h2>Faltan</h2>

    <div id="countdown">

        <div class="box">
            <span id="days">00</span>
            <p>Días</p>
        </div>

        <div class="box">
            <span id="hours">00</span>
            <p>Horas</p>
        </div>

        <div class="box">
            <span id="minutes">00</span>
            <p>Minutos</p>
        </div>

        <div class="box">
            <span id="seconds">00</span>
            <p>Segundos</p>
        </div>

    </div>

    <h3>Para el estreno de 2.3</h3>

</div>

<script src="script.js"></script>

</body>
